<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TopZone Clothing — Premium Fashion</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
/* ── DESIGN TOKENS ── */
:root {
  --ink:       #06000F;
  --ink2:      #0E0022;
  --ink3:      #160030;
  --ink4:      #1D003F;
  --surface:   rgba(255,255,255,0.04);
  --surface2:  rgba(255,255,255,0.07);
  --border:    rgba(212,175,55,0.18);
  --border2:   rgba(255,0,255,0.18);
  --pink:      #E040FB;
  --pink-soft: rgba(224,64,251,0.12);
  --gold:      #C9A84C;
  --gold-soft: rgba(201,168,76,0.12);
  --gold-lite: #E8C96A;
  --cream:     #F5EDD6;
  --white:     #FFFFFF;
  --muted:     rgba(255,255,255,0.45);
  --glow-p:    0 0 30px rgba(224,64,251,0.35),0 0 60px rgba(224,64,251,0.12);
  --glow-g:    0 0 30px rgba(201,168,76,0.4), 0 0 60px rgba(201,168,76,0.15);
  --radius:    18px;
  --radius-sm: 10px;
  --shadow:    0 24px 64px rgba(0,0,0,0.5);
  --font-body: "Outfit", sans-serif;
  --font-disp: "Cormorant Garamond", serif;
}

/* ── RESET ── */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{scroll-behavior:smooth;}
body{font-family:var(--font-body);background:var(--ink);color:var(--white);min-height:100vh;overflow-x:hidden;}
::selection{background:rgba(224,64,251,0.3);}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:linear-gradient(var(--pink),var(--gold));border-radius:4px;}

/* ── NOISE TEXTURE overlay ── */
body::before{
  content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
  opacity:0.4;
}

/* ── GLOBAL BG MESH ── */
body::after{
  content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 80% 60% at 10% 20%,  rgba(224,64,251,0.07) 0%, transparent 60%),
    radial-gradient(ellipse 60% 50% at 90% 80%,  rgba(201,168,76,0.06) 0%, transparent 55%),
    radial-gradient(ellipse 40% 40% at 50% 50%,  rgba(224,64,251,0.04) 0%, transparent 50%);
}

/* ── KEYFRAMES ── */
@keyframes splashPulse{
  0%,100%{box-shadow:0 0 0 0 rgba(224,64,251,0.6),0 0 40px rgba(224,64,251,0.4),0 0 80px rgba(201,168,76,0.3);}
  50%{box-shadow:0 0 0 20px rgba(224,64,251,0),0 0 70px rgba(224,64,251,0.6),0 0 140px rgba(201,168,76,0.4);}
}
@keyframes orbit{from{transform:rotate(0deg) translateX(120px) rotate(0deg);}to{transform:rotate(360deg) translateX(120px) rotate(-360deg);}}
@keyframes fadeUp{from{opacity:0;transform:translateY(28px);}to{opacity:1;transform:translateY(0);}}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
@keyframes scaleIn{from{opacity:0;transform:scale(0.88);}to{opacity:1;transform:scale(1);}}
@keyframes slideRight{from{opacity:0;transform:translateX(-24px);}to{opacity:1;transform:translateX(0);}}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes shimmer{0%{background-position:-200% 0;}100%{background-position:200% 0;}}
@keyframes toast-in{from{transform:translateX(110%);opacity:0;}to{transform:translateX(0);opacity:1;}}
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);}}
@keyframes lineGrow{from{width:0;}to{width:100%;}}
@keyframes barUp{from{transform:scaleY(0);}to{transform:scaleY(1);}}
@keyframes particleFade{0%{opacity:1;transform:translateY(0) scale(1);}100%{opacity:0;transform:translateY(-60px) scale(0);}}
@keyframes borderRotate{from{--angle:0deg;}to{--angle:360deg;}}
@keyframes goldShimmer{0%,100%{background-position:0% 50%;}50%{background-position:100% 50%;}}

.fade-up{animation:fadeUp 0.5s cubic-bezier(.22,.68,0,1.2) forwards;}
.fade-in{animation:fadeIn 0.4s ease forwards;}
.scale-in{animation:scaleIn 0.35s cubic-bezier(.22,.68,0,1.2) forwards;}
.slide-right{animation:slideRight 0.35s ease forwards;}
.float-anim{animation:float 4s ease-in-out infinite;}

/* ── TYPOGRAPHY ── */
.serif{font-family:var(--font-disp);}
.gradient-text{background:linear-gradient(135deg,var(--pink) 0%,var(--gold-lite) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.gold-text{background:linear-gradient(135deg,var(--gold) 0%,var(--gold-lite) 60%,var(--gold) 100%);background-size:200% 200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:goldShimmer 3s ease infinite;}

/* ── GLASS CARD ── */
.glass{
  background:linear-gradient(135deg,rgba(255,255,255,0.06) 0%,rgba(255,255,255,0.02) 100%);
  backdrop-filter:blur(20px) saturate(1.4);
  -webkit-backdrop-filter:blur(20px) saturate(1.4);
  border:1px solid var(--border);
  border-radius:var(--radius);
  transition:border-color 0.3s, box-shadow 0.3s, transform 0.3s;
}
.glass:hover{border-color:rgba(201,168,76,0.35);box-shadow:0 16px 48px rgba(0,0,0,0.4);}
.glass-dark{
  background:linear-gradient(160deg,rgba(22,0,48,0.9) 0%,rgba(6,0,15,0.95) 100%);
  backdrop-filter:blur(24px);border:1px solid var(--border);border-radius:var(--radius);
}

/* ── DIVIDER ── */
.divider{height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:0.4;margin:0;}

/* ── BUTTONS ── */
.btn{cursor:pointer;font-family:var(--font-body);font-weight:600;border:none;outline:none;transition:all 0.3s cubic-bezier(.22,.68,0,1.2);position:relative;overflow:hidden;letter-spacing:0.5px;}
.btn::after{content:"";position:absolute;inset:0;background:white;opacity:0;transition:opacity 0.2s;}
.btn:active::after{opacity:0.08;}

.btn-luxury{
  background:linear-gradient(135deg,#9B26AF 0%,#E040FB 40%,#C9A84C 80%,#E8C96A 100%);
  background-size:200% 200%;
  color:white;border-radius:50px;padding:14px 32px;font-size:14px;
  box-shadow:0 4px 24px rgba(224,64,251,0.3);
  animation:goldShimmer 4s ease infinite;
}
.btn-luxury:hover{transform:translateY(-2px);box-shadow:0 8px 40px rgba(224,64,251,0.45),0 0 0 1px rgba(224,64,251,0.3);}
.btn-luxury:active{transform:translateY(0);}

.btn-outline-gold{
  background:transparent;color:var(--gold-lite);
  border:1px solid rgba(201,168,76,0.5);border-radius:50px;padding:13px 30px;font-size:14px;
}
.btn-outline-gold:hover{background:var(--gold-soft);border-color:var(--gold);box-shadow:var(--glow-g);}

.btn-ghost{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);color:white;border-radius:50px;padding:10px 22px;font-size:13px;}
.btn-ghost:hover{background:rgba(255,255,255,0.1);}

.btn-sm{padding:8px 20px;font-size:12px;}
.btn-icon{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);color:white;border-radius:50%;width:40px;height:40px;display:flex;align-items:center;justify-content:center;font-size:18px;}
.btn-icon:hover{background:var(--pink-soft);border-color:var(--pink);}

/* ── INPUT ── */
.inp{
  width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.12);
  color:white;font-family:var(--font-body);font-size:14px;border-radius:var(--radius-sm);
  padding:13px 16px;outline:none;transition:all 0.25s;
}
.inp:focus{border-color:rgba(201,168,76,0.6);box-shadow:0 0 0 3px rgba(201,168,76,0.1),0 0 20px rgba(201,168,76,0.05);}
.inp::placeholder{color:rgba(255,255,255,0.25);}
.inp-label{font-size:11px;font-weight:600;letter-spacing:1px;color:var(--muted);text-transform:uppercase;margin-bottom:6px;display:block;}

/* ── NAV ── */
.nav{
  position:sticky;top:0;z-index:100;height:72px;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 40px;
  background:rgba(6,0,15,0.75);
  backdrop-filter:blur(32px) saturate(1.6);
  -webkit-backdrop-filter:blur(32px);
  border-bottom:1px solid rgba(201,168,76,0.12);
}
.nav-logo{display:flex;align-items:center;gap:12px;cursor:pointer;}
.nav-brand{font-family:var(--font-disp);font-size:1.5rem;font-weight:600;letter-spacing:2px;}
.nav-link{background:none;border:none;color:rgba(255,255,255,0.5);cursor:pointer;font-family:var(--font-body);font-size:13px;font-weight:500;letter-spacing:0.5px;padding:6px 14px;border-radius:50px;transition:all 0.2s;text-transform:uppercase;}
.nav-link:hover{color:white;background:rgba(255,255,255,0.06);}
.nav-link.active{color:var(--gold-lite);}

/* ── PILL FILTER ── */
.pill{padding:8px 20px;border-radius:50px;border:1px solid rgba(255,255,255,0.12);background:transparent;color:var(--muted);cursor:pointer;font-family:var(--font-body);font-size:12px;font-weight:500;letter-spacing:0.5px;transition:all 0.2s;white-space:nowrap;text-transform:uppercase;}
.pill:hover{border-color:rgba(201,168,76,0.4);color:var(--gold-lite);}
.pill.active{background:linear-gradient(135deg,rgba(201,168,76,0.2),rgba(224,64,251,0.15));border-color:rgba(201,168,76,0.5);color:var(--gold-lite);}

/* ── PRODUCT CARD ── */
.pcard{border-radius:20px;overflow:hidden;background:var(--surface);border:1px solid rgba(255,255,255,0.07);transition:all 0.4s cubic-bezier(.22,.68,0,1.2);cursor:pointer;position:relative;}
.pcard:hover{transform:translateY(-8px);border-color:rgba(201,168,76,0.3);box-shadow:0 32px 64px rgba(0,0,0,0.5),0 0 0 1px rgba(201,168,76,0.15);}
.pcard-img{width:100%;aspect-ratio:1;object-fit:cover;display:block;transition:transform 0.6s cubic-bezier(.22,.68,0,1.2);}
.pcard:hover .pcard-img{transform:scale(1.06);}
.pcard-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(6,0,15,0.9) 0%,transparent 50%);opacity:0;transition:opacity 0.3s;}
.pcard:hover .pcard-overlay{opacity:1;}

/* ── TAG CHIPS ── */
.tag{display:inline-block;font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:3px 10px;border-radius:20px;}
.tag-new{background:rgba(224,64,251,0.2);color:var(--pink);border:1px solid rgba(224,64,251,0.3);}
.tag-best{background:rgba(201,168,76,0.2);color:var(--gold-lite);border:1px solid rgba(201,168,76,0.35);}
.tag-sale{background:rgba(255,80,80,0.2);color:#ff8080;border:1px solid rgba(255,80,80,0.3);}
.tag-trend{background:rgba(64,196,255,0.2);color:#40c4ff;border:1px solid rgba(64,196,255,0.3);}

/* ── SIZE BTN ── */
.size-btn{border:1px solid rgba(255,255,255,0.15);background:transparent;color:var(--muted);cursor:pointer;border-radius:8px;font-family:var(--font-body);font-weight:600;font-size:13px;transition:all 0.2s;padding:8px 16px;letter-spacing:0.5px;}
.size-btn.active{border-color:var(--gold);background:var(--gold-soft);color:var(--gold-lite);box-shadow:0 0 12px rgba(201,168,76,0.2);}
.size-btn:hover:not(.active):not(.oos){border-color:rgba(201,168,76,0.4);color:white;}
.size-btn.oos{opacity:0.2;cursor:not-allowed;text-decoration:line-through;}

/* ── STATUS ── */
.status{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:0.5px;text-transform:uppercase;}
.status.ordered{background:rgba(255,165,0,0.15);color:#ffb347;border:1px solid rgba(255,165,0,0.2);}
.status.shipped{background:rgba(64,196,255,0.15);color:#40c4ff;border:1px solid rgba(64,196,255,0.2);}
.status.delivered{background:rgba(0,230,118,0.15);color:#00e676;border:1px solid rgba(0,230,118,0.2);}
.status.pending{background:rgba(224,64,251,0.15);color:var(--pink);border:1px solid rgba(224,64,251,0.2);}

/* ── TABLE ── */
table{width:100%;border-collapse:separate;border-spacing:0;}
thead tr{background:rgba(255,255,255,0.03);}
th{color:rgba(201,168,76,0.7);font-weight:600;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;text-align:left;padding:14px 18px;border-bottom:1px solid var(--border);}
td{padding:14px 18px;border-bottom:1px solid rgba(255,255,255,0.04);font-size:13px;vertical-align:middle;}
tbody tr{transition:background 0.15s;}
tbody tr:hover td{background:rgba(255,255,255,0.025);}


/* ── TOAST ── */
.toast-wrap{position:fixed;top:88px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:10px;}
.toast{
  display:flex;align-items:center;gap:12px;padding:14px 20px;min-width:280px;
  background:linear-gradient(135deg,rgba(14,0,34,0.95),rgba(22,0,50,0.95));
  backdrop-filter:blur(20px);
  border-radius:14px;border:1px solid var(--border);
  box-shadow:0 16px 48px rgba(0,0,0,0.5);
  animation:toast-in 0.4s cubic-bezier(.22,.68,0,1.2) forwards;
}
.toast-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}


/* ── SHIMMER ── */
.shimmer{background:linear-gradient(90deg,rgba(255,255,255,0.04) 25%,rgba(255,255,255,0.08) 50%,rgba(255,255,255,0.04) 75%);background-size:200% 100%;animation:shimmer 1.8s infinite;border-radius:8px;}

/* ── OVERLAY ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);backdrop-filter:blur(12px);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;}



/* ── SCROLL X ── */
.scroll-x{overflow-x:auto;}
.scroll-x::-webkit-scrollbar{height:3px;}

/* ── BADGE ── */
.badge{background:linear-gradient(135deg,var(--pink),#a000b0);color:white;border-radius:50%;width:20px;height:20px;font-size:10px;display:flex;align-items:center;justify-content:center;font-weight:700;position:absolute;top:-4px;right:-4px;}

/* ── PRODUCT GRID ── */
.product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:24px;}

/* ── DIVIDER LINE ── */
.d-line{height:1px;background:linear-gradient(90deg,transparent,rgba(201,168,76,0.3),transparent);}


/* ── MOBILE ── */
@media(max-width:768px){
  .nav{padding:0 20px;}
  .product-grid{grid-template-columns:repeat(2,1fr);gap:14px;}
}
</style>
</head>

// ── TOAST ────────────────────────────────
function Toaster({toasts}){
  const colors={success:"#00e676",error:"#ff5252",info:vars("--gold-lite")};
  return(
    <div className="toast-wrap">
      {toasts.map(t=>(
        <div key={t.id} className="toast">
          <div className="toast-dot" style={{background:t.type==="success"?"#00e676":t.type==="error"?"#ff5252":"#C9A84C"}}/>
          <span style={{fontSize:13,fontWeight:500}}>{t.message}</span>
        </div>
      ))}
    </div>
  );
}
function vars(v){return `var(${v})`;}

// ── SPLASH ───────────────────────────────
function Splash({onDone}){
  const [p,setP]=useState(0);
  useEffect(()=>{
    const t=[
      setTimeout(()=>setP(1),200),
      setTimeout(()=>setP(2),1000),
      setTimeout(()=>setP(3),1800),
      setTimeout(()=>onDone(),3000),
    ];
    return()=>t.forEach(clearTimeout);
  },[]);

  const dots=[
    {color:"#E040FB",delay:"0s"},{color:"#C9A84C",delay:"0.5s"},{color:"#E040FB",delay:"1s"},
    {color:"#C9A84C",delay:"1.5s"},{color:"#ffffff",delay:"0.25s"},{color:"#E8C96A",delay:"0.75s"},
  ];

  return(
    <div style={{position:"fixed",inset:0,background:"var(--ink)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",zIndex:9999,overflow:"hidden"}}>
      {/* Background radial glow */}
      <div style={{position:"absolute",width:600,height:600,borderRadius:"50%",background:"radial-gradient(circle,rgba(224,64,251,0.08) 0%,transparent 70%)",pointerEvents:"none"}}/>
      
      {/* Orbiting dots */}
      <div style={{position:"absolute",width:280,height:280,transition:"opacity 0.8s",opacity:p>=1?1:0}}>
        {dots.map((d,i)=>(
          <div key={i} style={{position:"absolute",top:"50%",left:"50%",width:6,height:6,borderRadius:"50%",background:d.color,marginTop:-3,marginLeft:-3,animation:`orbit ${3+i*0.4}s linear ${d.delay} infinite`,opacity:0.7}}/>
        ))}
      </div>

      {/* Logo circle */}
      <div style={{
        width:200,height:200,borderRadius:"50%",overflow:"hidden",
        transition:"all 0.8s cubic-bezier(.22,.68,0,1.2)",
        opacity:p>=1?1:0,transform:p>=1?"scale(1)":"scale(0.4)",
        border:"2px solid rgba(201,168,76,0.5)",
        animation:p>=1?"splashPulse 2.5s ease-in-out infinite":"none",
        background:"var(--ink2)",zIndex:2,position:"relative",
        boxShadow:"0 0 80px rgba(224,64,251,0.4)"
      }}>
        <img src={LOGO_SRC} style={{width:"100%",height:"100%",objectFit:"cover"}} alt="logo"/>
      </div>

      {/* Text */}
      <div style={{marginTop:32,textAlign:"center",transition:"all 0.8s 0.5s",opacity:p>=2?1:0,transform:p>=2?"translateY(0)":"translateY(20px)"}}>
        <h1 className="serif" style={{fontSize:"2.8rem",fontWeight:600,letterSpacing:8,color:"var(--gold-lite)"}}>TOP ZONE</h1>
        <div className="d-line" style={{margin:"12px auto",width:120}}/>
        <p style={{letterSpacing:10,fontSize:"0.75rem",color:"var(--muted)",fontWeight:400}}>CLOTHING</p>
      </div>

      {/* Loading bar */}
      <div style={{marginTop:48,width:120,height:1,background:"rgba(255,255,255,0.1)",borderRadius:1,overflow:"hidden",transition:"opacity 0.4s",opacity:p>=2?1:0}}>
        <div style={{height:"100%",background:"linear-gradient(90deg,var(--pink),var(--gold))",animation:"lineGrow 1.2s ease forwards"}}/>
      </div>
    </div>
  );
}

// ── NAVBAR ───────────────────────────────
function Nav({page,setPage,cartQty}){
  return(
    <nav className="nav">
      <div className="nav-logo" onClick={()=>setPage("home")}>
        <div style={{width:40,height:40,borderRadius:"50%",overflow:"hidden",border:"1.5px solid rgba(201,168,76,0.4)",flexShrink:0}}>
          <img src={LOGO_SRC} style={{width:"100%",height:"100%",objectFit:"cover"}} alt="logo"/>
        </div>
        <span className="nav-brand gradient-text">TopZone</span>
      </div>
      <div style={{display:"flex",gap:4,alignItems:"center"}}>
        {[["home","Home"],["categories","Discover"],["orders","Orders"]].map(([p,l])=>(
          <button key={p} className={`nav-link${page===p?" active":""}`} onClick={()=>setPage(p)}>{l}</button>
        ))}
      </div>
      <div style={{display:"flex",alignItems:"center",gap:12}}>
        <button className="btn btn-icon" style={{position:"relative"}} onClick={()=>setPage("cart")}>
          🛍
          {cartQty>0&&<span className="badge">{cartQty}</span>}
        </button>
      </div>
    </nav>
  );
}

// ── PRODUCT CARD ─────────────────────────
function PCard({p,onView,onCart}){
  const disc=Math.round((1-p.price/p.mrp)*100);
  const stock=Object.values(p.sizes).reduce((a,b)=>a+b,0);
  const [adding,setAdding]=useState(false);
  const add=(e)=>{e.stopPropagation();setAdding(true);onCart(p);setTimeout(()=>setAdding(false),700);};
  return(
    <div className="pcard fade-up" onClick={()=>onView(p)}>
      <div style={{position:"relative",overflow:"hidden"}}>
        <img className="pcard-img" src={p.image} alt={p.name} loading="lazy"/>
        <div className="pcard-overlay"/>
        {/* Tags */}
        <div style={{position:"absolute",top:12,left:12,display:"flex",flexDirection:"column",gap:5}}>
          {p.tags.includes("new")&&<span className="tag tag-new">New</span>}
          {p.tags.includes("bestseller")&&<span className="tag tag-best">Bestseller</span>}
          {p.tags.includes("sale")&&<span className="tag tag-sale">Sale</span>}
          {p.tags.includes("trending")&&<span className="tag tag-trend">Trending</span>}
        </div>
        {disc>0&&<div style={{position:"absolute",top:12,right:12,background:"rgba(0,230,118,0.15)",border:"1px solid rgba(0,230,118,0.3)",color:"#00e676",fontSize:11,fontWeight:700,padding:"3px 10px",borderRadius:20}}>{disc}% off</div>}

function Cart({cart,onUpdate,onCheckout}){
  const total=cart.reduce((s,i)=>s+i.price*i.qty,0);
  const [code,setCode]=useState("");const[disc,setDisc]=useState(0);const[msg,setMsg]=useState("");
  const apply=()=>{
    const c=COUPONS_DATA.find(x=>x.code===code.toUpperCase()&&x.active);
    if(c){const d=c.type==="percent"?Math.round(total*c.discount/100):c.discount;setDisc(d);setMsg(`✦ Saved ₹${d}`);}
    else{setMsg("✕ Invalid code");setDisc(0);}
  };
  if(!cart.length)return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:"60vh",gap:16,padding:40}}>
      <div style={{width:80,height:80,borderRadius:"50%",background:"var(--surface)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:36}}>🛍</div>

  return(
    <div style={{maxWidth:860,margin:"0 auto",padding:"40px 24px"}}>

        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          {cart.map((item,i)=>(
            <div key={i} className="glass" style={{padding:20,display:"flex",gap:16,alignItems:"center"}}>
              <div style={{width:80,height:80,borderRadius:12,overflow:"hidden",flexShrink:0}}>

                <p className="gold-text" style={{fontWeight:700,marginTop:4}}>₹{item.price.toLocaleString()}</p>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:2,background:"rgba(255,255,255,0.06)",borderRadius:50,padding:"4px 6px",border:"1px solid rgba(255,255,255,0.08)"}}>
                <button onClick={()=>onUpdate(i,item.qty-1)} style={{background:"none",border:"none",color:"white",cursor:"pointer",width:28,height:28,borderRadius:"50%",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center"}}>−</button>
                <span style={{fontWeight:700,minWidth:22,textAlign:"center",fontSize:14}}>{item.qty}</span>
                <button onClick={()=>onUpdate(i,item.qty+1)} style={{background:"none",border:"none",color:"white",cursor:"pointer",width:28,height:28,borderRadius:"50%",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center"}}>+</button>
              </div>
              <button onClick={()=>onUpdate(i,0)} style={{background:"none",border:"none",color:"rgba(255,100,100,0.6)",cursor:"pointer",fontSize:18,width:32,height:32,display:"flex",alignItems:"center",justifyContent:"center",borderRadius:"50%",transition:"all 0.2s"}} onMouseOver={e=>e.currentTarget.style.background="rgba(255,80,80,0.1)"} onMouseOut={e=>e.currentTarget.style.background="none"}>✕</button>
            </div>

              Proceed to Checkout →

            <p className="gold-text" style={{fontWeight:800,fontSize:"1.3rem",marginTop:12}}>₹{total.toLocaleString()}</p>
          </div>
          <button className="btn btn-luxury" style={{width:"100%",padding:13,marginBottom:20}} onClick={()=>{window.location.href=`upi://pay?pa=${UPI}&pn=TopZoneClothing&am=${total}&cu=INR&tn=Order_from_TopZone`;setTimeout(()=>addToast("Complete payment in UPI app then upload screenshot","info"),800);}}>
            📱 Open UPI App
          </button>
          <label className="inp-label">Upload Payment Screenshot <span style={{color:"#ff6b6b"}}>*</span></label>
          <div className="upload-zone" style={{marginTop:8}} onClick={()=>fRef.current.click()}>
            {scPrev?<img src={scPrev} style={{maxHeight:200,maxWidth:"100%",borderRadius:10}} alt="screenshot"/>:<>
              <p style={{fontSize:28,marginBottom:8}}>⬆️</p>
              <p style={{fontSize:13,color:"var(--muted)"}}>Click to upload</p>
              <p style={{fontSize:11,color:"rgba(255,255,255,0.2)",marginTop:4}}>JPG or PNG</p>
            </>}
          </div>
          <input ref={fRef} type="file" accept="image/*" onChange={handleFile} style={{display:"none"}}/>
        </div>
      )}
      <button className="btn btn-luxury" style={{width:"100%",padding:14}} onClick={()=>{
        if(pay==="upi"&&!sc){addToast("Please upload payment screenshot","error");return;}
        onSuccess();
      }}>{pay==="cod"?"Place Order (COD) →":"Confirm Order ✓"}</button>
    </div>
  );
}

// ── SUCCESS ───────────────────────────────
function Success({onContinue}){
  const[show,setShow]=useState(false);
  useEffect(()=>setTimeout(()=>setShow(true),100),[]);
  return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:"80vh",padding:40,gap:24}}>
      <div style={{position:"relative",transition:"all 0.7s cubic-bezier(.22,.68,0,1.2)",opacity:show?1:0,transform:show?"scale(1)":"scale(0.4)"}}>
        <div style={{position:"absolute",inset:-20,borderRadius:"50%",background:"radial-gradient(circle,rgba(0,230,118,0.12),transparent)",animation:"splashPulse 2s ease infinite"}}/>
        <svg width="130" height="130" viewBox="0 0 130 130">
          <circle cx="65" cy="65" r="55" fill="none" stroke="rgba(0,230,118,0.2)" strokeWidth="1"/>
          <circle cx="65" cy="65" r="55" fill="none" stroke="#00e676" strokeWidth="3"
            strokeDasharray="346" strokeDashoffset={show?0:346}
            style={{transition:"stroke-dashoffset 1s ease",strokeLinecap:"round"}}/>
          <polyline points="38,65 58,85 92,45" fill="none" stroke="#00e676" strokeWidth="6"
            strokeDasharray="80" strokeDashoffset={show?0:80}
            style={{transition:"stroke-dashoffset 0.8s ease 0.5s",strokeLinecap:"round",strokeLinejoin:"round"}}/>
        </svg>
      </div>
      <div style={{textAlign:"center",transition:"all 0.7s 0.3s",opacity:show?1:0,transform:show?"translateY(0)":"translateY(24px)"}}>
        <h1 className="serif" style={{fontSize:"2.5rem",fontWeight:600,color:"#00e676",marginBottom:8}}>Order Placed!</h1>
        <p style={{color:"var(--muted)"}}>Your order is confirmed and being processed.</p>
      </div>
      <div className="glass" style={{padding:"18px 32px",textAlign:"center"}}>
        <p style={{fontSize:11,letterSpacing:1.5,color:"var(--muted)",textTransform:"uppercase"}}>Order ID</p>
        <p className="gold-text" style={{fontWeight:800,fontSize:"1.3rem",marginTop:4}}>TZ{Date.now().toString().slice(-5)}</p>
      </div>
      <button className="btn btn-luxury" style={{padding:"14px 40px"}} onClick={onContinue}>Continue Shopping →</button>
    </div>
  );
}

// ── ORDERS PAGE ───────────────────────────
function MyOrders(){
  return(
    <div style={{maxWidth:800,margin:"0 auto",padding:"40px 24px"}}>
      <h1 className="serif" style={{fontSize:"2rem",fontWeight:600,marginBottom:28}}>My Orders</h1>
      {ORDERS.slice(0,3).map(o=>(
        <div key={o.id} className="glass" style={{padding:24,marginBottom:16}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:16}}>
            <div>
              <p style={{fontWeight:700,color:"var(--gold-lite)"}}>#{o.id}</p>
              <p style={{color:"var(--muted)",fontSize:12,marginTop:3}}>{o.date}</p>
            </div>
            <span className={`status ${o.status}`}>{o.status.charAt(0).toUpperCase()+o.status.slice(1)}</span>
          </div>
          {o.items.map((item,i)=>(
            <div key={i} style={{display:"flex",justifyContent:"space-between",fontSize:13,padding:"8px 0",borderBottom:"1px solid rgba(255,255,255,0.05)"}}>
              <span style={{color:"rgba(255,255,255,0.7)"}}>{item.name} <span style={{color:"var(--muted)"}}>({item.size}) × {item.qty}</span></span>
              <span className="gold-text" style={{fontWeight:600}}>₹{item.price.toLocaleString()}</span>
            </div>
          ))}
          <div style={{display:"flex",justifyContent:"space-between",marginTop:12,fontWeight:700}}>
            <span>Total</span><span className="gold-text">₹{o.total.toLocaleString()}</span>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:0,marginTop:20}}>
            {["Ordered","Shipped","Delivered"].map((s,i)=>{
              const lvl={ordered:0,shipped:1,delivered:2,pending:-1}[o.status]??0;
              const done=i<=lvl;
              return(
                <React.Fragment key={s}>
                  <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:5,zIndex:1}}>
                    <div style={{width:28,height:28,borderRadius:"50%",background:done?"linear-gradient(135deg,var(--pink),var(--gold))":"rgba(255,255,255,0.07)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,border:`1px solid ${done?"transparent":"rgba(255,255,255,0.1)"}`}}>{done?"✓":""}</div>
                    <span style={{fontSize:10,color:done?"var(--gold-lite)":"var(--muted)",letterSpacing:0.5,whiteSpace:"nowrap",textTransform:"uppercase"}}>{s}</span>
                  </div>
                  {i<2&&<div style={{flex:1,height:1,background:i<lvl?"linear-gradient(90deg,var(--gold),var(--pink))":"rgba(255,255,255,0.08)",marginBottom:18}}/>}
                </React.Fragment>
              );
            })}
          </div>
        </div>
      ))}
    </div>
  );
}

// ── SHOP PORTAL ───────────────────────────
function Shop(){
  const[page,setPage]=useState("home");
  const[cart,setCart]=useState([]);
  const[sel,setSel]=useState(null);
  const[ckTotal,setCkTotal]=useState(0);
  const[toasts,setToasts]=useState([]);
  const addToast=(msg,type="success")=>{const id=Date.now();setToasts(t=>[...t,{id,message:msg,type}]);setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),3000);};
  const addCart=(p,sz=null,qty=1)=>{setCart(c=>{const ex=c.findIndex(i=>i.id===p.id&&i.size===sz);if(ex>=0){const u=[...c];u[ex]={...u[ex],qty:u[ex].qty+qty};return u;}return[...c,{...p,size:sz,qty}];});addToast(`${p.name} added to cart`);};
  const updCart=(i,q)=>q===0?setCart(c=>c.filter((_,x)=>x!==i)):setCart(c=>c.map((item,x)=>x===i?{...item,qty:q}:item));
  const qty=cart.reduce((s,i)=>s+i.qty,0);
  return(
    <div>
      <Nav page={page} setPage={setPage} cartQty={qty}/>
      <Toaster toasts={toasts}/>
      {page==="home"&&<Home onView={setSel} onCart={addCart}/>}
      {page==="cart"&&<Cart cart={cart} onUpdate={updCart} onCheckout={(t)=>{setCkTotal(t);setPage("checkout");}}/>}
      {page==="checkout"&&<Checkout total={ckTotal} onSuccess={()=>setPage("success")} addToast={addToast}/>}
      {page==="success"&&<Success onContinue={()=>{setCart([]);setPage("home");}}/>}
      {page==="orders"&&<MyOrders/>}
      {sel&&<PModal p={sel} onClose={()=>setSel(null)} onCart={(p,s,q)=>{addCart(p,s,q);setSel(null);}} onBuy={(p,s,q)=>{addCart(p,s,q);setCkTotal(p.price*q);setPage("checkout");setSel(null);}}/>}
    </div>
  );
}

  const[splash,setSplash]=useState(true);
  const[portal,setPortal]=useState(null);
  if(splash)return<Splash onDone={()=>setSplash(false)}/>;
  if(portal==="shop")return<Shop/>;
  return(
    <div style={{minHeight:"100vh",background:"var(--ink)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24,position:"relative",overflow:"hidden"}}>
      <div style={{position:"absolute",inset:0,background:"radial-gradient(ellipse 80% 60% at 50% 50%,rgba(201,168,76,0.04),transparent)"}}/>
      <div style={{position:"absolute",top:0,left:0,right:0,height:1,background:"linear-gradient(90deg,transparent,rgba(201,168,76,0.3),transparent)"}}/>
      
      <div style={{textAlign:"center",marginBottom:48,animation:"fadeUp 0.7s ease forwards",position:"relative",zIndex:1}}>
        <div className="float-anim" style={{marginBottom:24}}>

        </div>
        <div style={{display:"flex",alignItems:"center",gap:16,justifyContent:"center",marginBottom:12}}>
          <div style={{height:1,width:48,background:"linear-gradient(90deg,transparent,var(--gold))"}}/>
          <p style={{fontSize:10,letterSpacing:4,color:"var(--gold)",fontWeight:600,textTransform:"uppercase"}}>Est. 2026</p>
          <div style={{height:1,width:48,background:"linear-gradient(90deg,var(--gold),transparent)"}}/>
        </div>
        <h1 className="serif" style={{fontSize:"clamp(2.5rem,6vw,4.5rem)",fontWeight:600,letterSpacing:6,marginBottom:4}}>
          <span className="gradient-text">TOP ZONE</span>
        </h1>
        <p style={{letterSpacing:10,fontSize:"0.75rem",color:"var(--muted)",fontWeight:400,textTransform:"uppercase",marginBottom:16}}>Clothing</p>
        <div className="d-line" style={{margin:"0 auto 20px",maxWidth:200}}/>
        <p style={{color:"rgba(255,255,255,0.4)",fontSize:14,maxWidth:380,margin:"0 auto",lineHeight:1.8,fontStyle:"italic",fontFamily:"var(--font-disp)"}}>
          "Where every garment tells a story of elegance."
        </p>
      </div>

      <div style={{display:"flex",gap:16,flexWrap:"wrap",justifyContent:"center",animation:"fadeUp 0.7s 0.2s ease both",position:"relative",zIndex:1}}>
        <button className="btn btn-luxury" style={{padding:"16px 44px",fontSize:"1rem",letterSpacing:0.5}} onClick={()=>setPortal("shop")}>
          Explore Collection →
        </button>
      </div>
      
      <div style={{position:"absolute",bottom:24,display:"flex",gap:24,animation:"fadeIn 1s 0.5s ease both"}}>
        {["Premium Quality","Free Shipping","Easy Returns"].map(f=>(
          <p key={f} style={{fontSize:11,color:"rgba(255,255,255,0.2)",display:"flex",alignItems:"center",gap:5}}>
            <span style={{color:"var(--gold)",fontSize:8}}>✦</span>{f}
          </p>
        ))}
      </div>
    </div>
  );
}

ReactDOM.render(<App/>,document.getElementById("root"));
</script>
